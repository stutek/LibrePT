# OWASP ZAP baseline rule config for LibrePT — consumed by `zap-baseline.py -c` in `build check`.
#
# Policy (AGENT_RULES §2.A.3, "squeaky clean"): every ZAP alert is either FIXED at its source
# (security headers served by deploy/local_http_server.py) or IGNOREd here with a written reason.
# Nothing is left to merely WARN — a warning would fail the build. Only alerts that are genuinely
# not applicable to an offline-first, buildless, static PWA (no backend, no build step, no auth)
# are ignored below. Format: <pluginId><TAB><IGNORE|WARN|FAIL><TAB># reason
#
10027	IGNORE	# Information Disclosure - Suspicious Comments: passive heuristic matching ordinary words (select/user/TODO) in our own open-source, shipped JS comments; no secrets are disclosed.
10031	IGNORE	# User Controllable HTML Element Attribute: "feedback-tag" is only ever a static input name= attribute; the app never reads ?feedback-tag from the URL, so nothing is reflected — false positive.
10049	IGNORE	# Non-Storable Content: cache-storability of the local dev server's 302/404/manifest responses; production caching is the static host's concern, and this is not a security weakness.
10055	IGNORE	# CSP unsafe-inline: this suppresses ONLY the style-src 'unsafe-inline' case — the app is a buildless PWA that sets dynamic inline styles (signal tinting, computed layout) with no build step to hash/extract them, and all interpolated content is escapeHTML'd. NOTE: script-src was independently hardened to 'self' (no unsafe-inline) in index.html/the dev-server CSP header, not via this ignore.
10109	IGNORE	# Modern Web Application: informational notice that this is a SPA, not a vulnerability.
10202	IGNORE	# Absence of Anti-CSRF Tokens: there is no server-side, state-changing form — data lives in localStorage on a local-only static app, so CSRF tokens are not applicable.
90003	IGNORE	# Sub Resource Integrity Missing: flagged on the external Google Fonts stylesheet, whose CSS content is not integrity-pinnable; the app is buildless so there is no bundler to inject hashes.
90004	IGNORE	# Cross-Origin-Embedder-Policy: require-corp would block the external CDN fonts/icons the app loads; cross-origin isolation (SharedArrayBuffer) is not used, so COEP offers no benefit here.
