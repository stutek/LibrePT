name: Deploy demo to GitHub Pages

# Publishes ONLY the runtime app (a freshly assembled dist/) to GitHub Pages on every
# push to main. Publishes only src/, so tests/, use_cases/, build/, deploy/, and the Markdown docs
# stay out of the public demo, and avoids committing a dist/ folder or a gh-pages branch.
#
# One-time setup in the repo: Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". After that this workflow is the deploy path.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the official Pages deploy actions require
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
      - name: Run Ruff
        run: .venv/bin/python -c "from build import run_python_lint; run_python_lint()"

  frontend-lint:
    name: Frontend Lint & Format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
      - name: Run Biome
        run: .venv/bin/python -c "from build import run_frontend_lint; run_frontend_lint()"

  dependency-scan:
    name: Dependency Security Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
      - name: Run pip-audit
        run: .venv/bin/python -c "from build import run_security_audit; run_security_audit()"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
      - name: Run Unit Tests
        run: .venv/bin/python -c "from build import run_unit_tests; run_unit_tests()"

  e2e-tests:
    name: E2E Browser Tests
    needs: [python-lint, frontend-lint, dependency-scan, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies & Browsers
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/playwright install chromium --with-deps
      - name: Run E2E Tests
        run: .venv/bin/python -c "from build import run_e2e_tests; run_e2e_tests()"

  dynamic-security-checks:
    name: Dynamic Security Checks
    needs: [python-lint, frontend-lint, dependency-scan, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Dynamic Security Checks
        run: python -c "from build import run_dynamic_security_checks; run_dynamic_security_checks()"

  build:
    name: Assemble & Bundle App
    needs: [e2e-tests, dynamic-security-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The runtime app lives under src/. Publish that whole tree (index.html + app.js +
      # index.css + manifest.json + sw.js + i18n/ + components/ + icons/) flattened to the dist
      # root, so relative paths resolve the same as in local dev. This mirrors build/run_build()
      # (build/__init__.py) — keep the two in sync.
      - name: Assemble dist
        run: |
          mkdir -p dist
          cp -r src/. dist/
          touch dist/.nojekyll   # disable Jekyll processing on the published site
          # Build stamp: overwrite version.js with the real short commit SHA + UTC build time, so the
          # header shows which build is live and a client screenshot pins a bug report to a commit.
          commit="${GITHUB_SHA::7}"
          builtAt="$(date -u +%Y-%m-%dT%H:%MZ)"
          printf 'export const BUILD_INFO = { commit: "%s", builtAt: "%s" };\n' "${commit}" "${builtAt}" > dist/version.js
          echo "Stamped build ${commit} (${builtAt})"
          # GitHub Pages serves a project site under /<repo>/, but the source assumes the
          # domain root (<base href="/">) so it works when src/ is served at localhost:8081/.
          # Rewrite the base to the repo sub-path so index.css, manifest.json, icons and the
          # service worker resolve on Pages. app.js derives the same sub-path from its own URL.
          base="/${GITHUB_REPOSITORY##*/}/"
          sed -i "s#<base href=\"/\">#<base href=\"${base}\">#" dist/index.html
          echo "Rewrote <base> to ${base}"
          # SPA deep-link fallback: GitHub Pages serves 404.html for any path with no file.
          # Shipping the app shell as 404.html lets a direct visit to a clean route
          # (e.g. /LibrePT/sessions/2026-07-17) boot the app, which then resolves the route
          # client-side — or shows the in-app not-found view for an unknown one.
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
