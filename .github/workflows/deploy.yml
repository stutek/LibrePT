name: Deploy demo to GitHub Pages

# Publishes ONLY the runtime app (a freshly assembled dist/) to GitHub Pages on every
# push to main. Keeps tests/, use_cases/, pipeline.py, and the Markdown docs out of the
# public demo, and avoids committing a dist/ folder or maintaining a gh-pages branch.
#
# One-time setup in the repo: Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". After that this workflow is the deploy path.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the official Pages deploy actions require
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The runtime app lives under src/. Publish that whole tree (index.html + app.js +
      # index.css + mockData.js + manifest.json + sw.js + components/ + icons/) flattened to
      # the dist root, so relative paths resolve the same as in local dev. This mirrors
      # pipeline.py's run_build() — keep the two in sync.
      - name: Assemble dist
        run: |
          mkdir -p dist
          cp -r src/. dist/
          touch dist/.nojekyll   # disable Jekyll processing on the published site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
